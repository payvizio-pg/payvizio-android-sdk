name: Publish Android SDK

# Tag-driven Maven Central publish. Required secrets:
#   MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD  — Sonatype user-token pair
#                                                    (https://central.sonatype.com → Generate User Token)
#   SIGNING_KEY                                     — base64-encoded GPG private key
#   SIGNING_KEY_PASSWORD                            — passphrase for the key
#
# build.gradle.kts must apply the `com.vanniktech.maven.publish` plugin
# (or the official `maven-publish` + `signing` plugins) and read these as
# GPG_PRIVATE_KEY / GPG_PRIVATE_KEY_PASSWORD properties.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - name: Verify build.gradle version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(grep -E 'version\s*=\s*"' sdk/build.gradle.kts | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')"
          [ "$PKG" = "$TAG" ] || { echo "Version mismatch: gradle=$PKG tag=$TAG"; exit 1; }
      - name: Build + test
        run: ./gradlew sdk:assembleRelease sdk:test
      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: sdk/build/outputs/aar/*-release.aar
